<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Create Account</h2>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="regUsername">Username:</label>
                <input type="text" id="regUsername" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label for="regPassword">Password:</label>
                <div class="password-wrapper">
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                    <button type="button" id="toggleRegPassword" class="toggle-btn">Show</button>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password:</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                    <button type="button" id="toggleConfirmPassword" class="toggle-btn">Show</button>
                </div>
            </div>

            <button type="submit" class="login-submit-btn" style="background-color: #28a745;">Sign Up</button>
        </form>
        
        <p id="regMessage"></p>
        <p class="signup-link">Already have an account? <a href="login.html" style="color: #007bff;">Login here</a></p>
    </div>

    <script src="register-script.js"></script>
</body>
</html>
