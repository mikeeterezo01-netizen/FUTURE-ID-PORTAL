<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees Identification Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Base Dashboard Container */
        .portal-container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
        }

        .portal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f4f4f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .portal-header h2 { margin: 0; color: #1a252f; }

        .user-badge {
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Controls Section */
        .controls-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .search-box {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            text-transform: uppercase;
        }

        .add-emp-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .add-emp-btn:hover { background-color: #218838; }

        /* Employee Display Grid */
        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Modern ID Card Layout */
        .id-card {
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border: 2px solid #dcdde1;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            position: relative;
            font-size: 13px;
            color: #2f3542;
            text-transform: uppercase;
        }

        .card-header {
            text-align: center;
            border-bottom: 1px dashed #ced4da;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }

        /* Action Controls Layout inside Card */
        .card-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
        }

        .action-btn {
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            text-transform: none;
        }

        .edit-btn { background-color: #ffa502; }
        .edit-btn:hover { background-color: #eccc68; }
        .delete-btn { background-color: #ff4757; }
        .delete-btn:hover { background-color: #ff6b81; }

        /* Photo Display Area for ID Card */
        .emp-photo-container {
            width: 90px;
            height: 90px;
            margin: 0 auto 10px auto;
            border-radius: 50%;
            border: 3px solid #2c3e50;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #747d8c;
        }

        .emp-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-fallback {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .emp-name { font-size: 16px; font-weight: bold; color: #2c3e50; }
        .emp-office { font-size: 13px; color: #007bff; font-weight: bold; }
        .emp-id { font-family: monospace; background: #e1b12c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }

        /* Card details metadata structure */
        .card-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 10px;
        }

        .detail-item { font-size: 11px; line-height: 1.3; }
        .detail-item strong { color: #57606f; text-transform: none; }
        
        .full-width-detail {
            grid-column: span 2;
            border-top: 1px solid #f1f2f6;
            padding-top: 5px;
            margin-top: 5px;
        }

        /* NEW STYLE: Lalagyan ng Pirma sa ID Card */
        .signature-display {
            grid-column: span 2;
            text-align: center;
            border-top: 1px solid #f1f2f6;
            margin-top: 8px;
            padding-top: 5px;
        }
        
        .signature-display img {
            max-width: 150px;
            height: 40px;
            object-fit: contain;
        }

        .sig-label {
            font-size: 9px;
            color: #7f8c8d;
            display: block;
            margin-top: 2px;
            text-transform: none;
        }

        /* --- FORM POP-UP MODAL BACKGROUND --- */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            overflow-y: auto; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .modal-content h3 { margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 8px; }

        /* Form Layout Columns */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .form-grid .form-group { display: flex; flex-direction: column; }
        .form-grid .form-group.full-row { grid-column: span 2; }
        .form-grid .form-group label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #57606f; }
        
        .form-grid .form-group input, .form-grid .form-group select { 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            text-transform: uppercase; 
        }

        .form-grid .form-group input[type="file"] { text-transform: none; }

        /* NEW STYLE: Live Signature Notepad Canvas */
        .signature-pad-container {
            border: 2px dashed #b2bec3;
            background-color: #f5f6fa;
            border-radius: 6px;
            position: relative;
            margin-top: 5px;
        }

        canvas#signatureCanvas {
            width: 100%;
            height: 130px;
            display: block;
            cursor: crosshair;
        }

        .sig-controls {
            display: flex;
            justify-content: space-between;
            background-color: #dfe4ea;
            padding: 6px 10px;
            border-radius: 0 0 4px 4px;
        }

        .sig-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 3px;
        }
        .clear-sig { background-color: #ffeaa7; color: #d63031; }
        .done-sig { background-color: #55efc4; color: #00b894; }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .cancel-btn { background-color: #6c757d; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
        .save-btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .portal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .logout-btn { background-color: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .no-records {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #a4b0be;
            font-size: 16px;
            font-style: italic;
            text-transform: none;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        
        <div class="portal-header">
            <div>
                <h2>Employees Identification Portal</h2>
                <small style="color: #7f8c8d;">Provincial Government of Surigao del Norte</small>
            </div>
            <div class="user-badge">Admin: <span id="userGreeting">Guest</span></div>
        </div>

        <div class="controls-row">
            <input type="text" id="searchBar" class="search-box" placeholder="🔎 Search registered ID..." onkeyup="filterEmployees()">
            <button class="add-emp-btn" onclick="openModal()">+ Create Employee ID</button>
        </div>

        <div class="employee-grid" id="employeeGrid"></div>

        <div class="portal-footer">
            <span style="font-size: 14px; color: #95a5a6;">Status: Secure Database Synchronized</span>
            <button onclick="logout()" class="logout-btn">Log Out</button>
        </div> 
</div>
    
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Create New Employee Identification Profile</h3>
            
            <form id="newEmployeeForm" onsubmit="saveEmployee(event)">
                <input type="hidden" id="editCardIndex" value="">
                <input type="hidden" id="savedSignatureData" value="">

                <div class="form-grid">
                    <div class="form-group full-row">
                        <label for="empPhoto">Employee Photo Attachment (JPEG/PNG)</label>
                        <input type="file" id="empPhoto" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="middleName">Middle Name</label>
                        <input type="text" id="middleName">
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>

                    <div class="form-group">
                        <label for="birthday">Birthday *</label>
                        <input type="date" id="birthday" required>
                    </div>

                    <div class="form-group">
                        <label for="office">Assigned Office / Department *</label>
                        <select id="office" required>
                            <option value="">-- Select Office --</option>
                            <option value="Information Technology Office">Information Technology Office</option>
                            <option value="Human Resource Division">Human Resource Division</option>
                            <option value="Finance & Accounting Department">Finance & Accounting Department</option>
                            <option value="Administrative Services">Administrative Services</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="bloodType">Blood Type *</label>
                        <select id="bloodType" required>
                            <option value="A+">A+</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B-">B-</option>
                            <option value="AB+">AB+</option><option value="AB-">AB-</option>
                            <option value="O+">O+</option><option value="O-">O-</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="height">Height (inches) *</label>
                        <input type="number" id="height" placeholder="e.g. 62" required>
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg) *</label>
                        <input type="number" id="weight" placeholder="e.g. 60" required>
                    </div>

                    <div class="form-group">
                        <label for="tin">TIN (Tax ID Number) *</label>
                        <input type="text" id="tin" placeholder="000-000-000" required>
                    </div>

                    <div class="form-group">
                        <label for="gsis">GSIS BP Number *</label>
                        <input type="text" id="gsis" placeholder="10 digits" required>
                    </div>

                    <div class="form-group">
                        <label for="telephone">Telephone Number</label>
                        <input type="text" id="telephone" placeholder="e.g. 885-4321">
                    </div>

                    <div class="form-group">
                        <label for="emergencyContact">Emergency Contact (Phone) *</label>
                        <input type="text" id="emergencyContact" placeholder="e.g. 0917-000-0000" required>
                    </div>

                    <div class="form-group full-row">
                        <label for="address">Complete Address *</label>
                        <input type="text" id="address" placeholder="House No., Street, Barangay, City/Province" required>
                    </div>

                    <div class="form-group full-row">
                        <label>Employee Digital Signature Notepad *</label>
                        <div class="signature-pad-container">
                            <canvas id="signatureCanvas"></canvas>
                            <div class="sig-controls">
                                <button type="button" class="sig-btn clear-sig" onclick="clearSignature()">Clear</button>
                                <button type="button" class="sig-btn done-sig" onclick="lockSignature()">Done</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save-btn" id="submitFormBtn">Generate ID Card</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const loggedInUser = localStorage.getItem("savedUsername") || "Admin";
        document.getElementById("userGreeting").textContent = loggedInUser;

        function logout() { window.location.href = "login.html"; }

        const modal = document.getElementById("employeeModal");
        
        // --- SIGNATURE CANVAS ENGINE LOGIC ---
        const canvas = document.getElementById("signatureCanvas");
        const ctx = canvas.getContext("2d");
        let isDrawing = false;

        // I-set ang tamang lapad at taas ng guhit sa canvas
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 130;
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            ctx.strokeStyle = "#2c3e50";
        }

        // Mouse Drawing Listeners
        canvas.addEventListener("mousedown", (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener("mousemove", (e) => { if(isDrawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
        canvas.addEventListener("mouseup", () => isDrawing = false);
        canvas.addEventListener("mouseleave", () => isDrawing = false);

        // Touchscreen Drawing Listeners para sa Mobile/Tablets
        canvas.addEventListener("touchstart", (e) => {
            isDrawing = true; ctx.beginPath();
            const rect = canvas.getBoundingClientRect();
            ctx.moveTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            e.preventDefault();
        });
        canvas.addEventListener("touchmove", (e) => {
            if(!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        });
        canvas.addEventListener("touchend", () => isDrawing = false);

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById("savedSignatureData").value = "";
            canvas.style.backgroundColor = "#f5f6fa";
        }

        function lockSignature() {
            // I-convert ang iginuhit na pirma bilang text image string URL
            const dataURL = canvas.toDataURL("image/png");
            
            // Suriin kung walang iginuhit (blangko ang notepad)
            const blankCanvas = document.createElement('canvas');
            blankCanvas.width = canvas.width;
            blankCanvas.height = canvas.height;
            if (canvas.toDataURL() === blankCanvas.toDataURL()) {
                alert("PLEASE PROVIDE A SIGNATURE BEFORE CLICKING DONE.");
                return;
            }

            document.getElementById("savedSignatureData").value = dataURL;
            canvas.style.backgroundColor = "#e1b12c20"; // Magpapalit ng kulay bilang indikasyon na tapos na
            alert("SIGNATURE CAPTURED SUCCESSFULLY!");
        }

        function openModal() { 
            document.getElementById("modalTitle").textContent = "Create New Employee Identification Profile";
            document.getElementById("submitFormBtn").textContent = "Generate ID Card";
            document.getElementById("editCardIndex").value = ""; 
            modal.style.display = "flex"; 
            setTimeout(resizeCanvas, 100); // Tiyaking lilitaw agad ang sukat ng canvas pagkabukas
            clearSignature();
        }
        
        function closeModal() { 
            modal.style.display = "none"; 
            document.getElementById("newEmployeeForm").reset(); 
            clearSignature();
        }

        let registeredEmployees = JSON.parse(localStorage.getItem("registeredEmployees")) || [];
        window.addEventListener("DOMContentLoaded", displayRegisteredIDs);

        function displayRegisteredIDs() {
            const grid = document.getElementById("employeeGrid");
            grid.innerHTML = ""; 

            if (registeredEmployees.length === 0) {
                grid.innerHTML = `<div class="no-records">⚠️ No registered employee IDs found. Click "+ Create Employee ID" to begin.</div>`;
                return;
            }

            registeredEmployees.forEach((emp, index) => {
                const middleInitial = emp.middleName ? ` ${emp.middleName.charAt(0)}.` : "";
                const fullName = `${emp.firstName}${middleInitial} ${emp.lastName}`;
                const initials = (emp.firstName.charAt(0) + emp.lastName.charAt(0));

                let photoHTML = `<div class="avatar-fallback">${initials}</div>`;
                if (emp.photoData) {
                    photoHTML = `<img src="${emp.photoData}" alt="Employee Photo">`;
                }

                // Pirma HTML display segment
                let signatureHTML = `<span style="color:#ff4757; font-size:10px;">WITHOUT SIGNATURE</span>`;
                if (emp.signatureData) {
                    signatureHTML = `<img src="${emp.signatureData}" alt="Employee Signature">`;
                }

                const card = document.createElement("div");
                card.className = "id-card";
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn edit-btn" onclick="setupEdit(${index})">Edit</button>
                        <button class="action-btn delete-btn" onclick="triggerDelete(${index})">Delete</button>
                    </div>
                    <div class="card-header">
                        <div class="emp-photo-container">
                            ${photoHTML}
                        </div>
                        <div class="emp-name">${fullName}</div>
                        <div class="emp-office">${emp.office}</div>
                        <span class="emp-id">ID: ${emp.empId}</span>
                    </div>
                    <div class="card-details">
                        <div class="detail-item"><strong>Birthday:</strong> <span>${emp.birthday}</span></div>
                        <div class="detail-item"><strong>Blood Type:</strong> <span>${emp.bloodType}</span></div>
                        <div class="detail-item"><strong>Height:</strong> <span>${emp.height}</span> IN</div>
                        <div class="detail-item"><strong>Weight:</strong> <span>${emp.weight}</span> KG</div>
                        <div class="detail-item"><strong>TIN:</strong> <span>${emp.tin}</span></div>
                        <div class="detail-item"><strong>GSIS:</strong> <span>${emp.gsis}</span></div>
                        <div class="detail-item"><strong>Telephone:</strong> <span>${emp.telephone}</span></div>
                        <div class="detail-item"><strong>Emergency:</strong> <span>${emp.emergencyContact}</span></div>
                        <div class="detail-item full-width-detail"><strong>Address:</strong> <span>${emp.address}</span></div>
                        
                        <div class="signature-display">
                            ${signatureHTML}
                            <span class="sig-label">Employee Signature</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function saveEmployee(event) {
            event.preventDefault();

            const firstName = document.getElementById("firstName").value.trim().toUpperCase();
            const middleName = document.getElementById("middleName").value.trim().toUpperCase();
            const lastName = document.getElementById("lastName").value.trim().toUpperCase();
            const birthday = document.getElementById("birthday").value;
            const office = document.getElementById("office").value.toUpperCase();
            const bloodType = document.getElementById("bloodType").value.toUpperCase();
            const height = document.getElementById("height").value;
            const weight = document.getElementById("weight").value;
            const tin = document.getElementById("tin").value.trim().toUpperCase();
            const gsis = document.getElementById("gsis").value.trim().toUpperCase();
            const telephone = document.getElementById("telephone").value.trim().toUpperCase() || "N/A";
            const emergencyContact = document.getElementById("emergencyContact").value.trim().toUpperCase();
            const address = document.getElementById("address").value.trim().toUpperCase();

            const signatureData = document.getElementById("savedSignatureData").value;
            const photoFile = document.getElementById("empPhoto").files[0];
            const editIndex = document.getElementById("editCardIndex").value;

            if (editIndex === "" && !signatureData) {
                alert("PLEASE CONCLUDE THE SIGNATURE NOTEPAD AND CLICK DONE BEFORE GENERATING THE ID.");
                return;
            }

            function commitToStorage(base64ImageString) {
                if (editIndex !== "") {
                    const targetIndex = parseInt(editIndex);
                    const existingPhoto = registeredEmployees[targetIndex].photoData || "";
                    const existingSignature = registeredEmployees[targetIndex].signatureData || "";
                    
                    registeredEmployees[targetIndex] = {
                        ...registeredEmployees[targetIndex], 
                        firstName, middleName, lastName, birthday, office, bloodType, height, weight, tin, gsis, telephone, emergencyContact, address,
                        photoData: base64ImageString !== null ? base64ImageString : existingPhoto,
                        signatureData: signatureData !== "" ? signatureData : existingSignature
                    };
                } else {
                    const generatedIdString = "2026-" + Math.floor(1000 + Math.random() * 9000);
                    const newEmployeeData = {
                        empId: generatedIdString,
                        firstName, middleName, lastName, birthday, office, bloodType, height, weight, tin, gsis, telephone, emergencyContact, address,
                        photoData: base64ImageString || "",
                        signatureData: signatureData
                    };
                    registeredEmployees.push(newEmployeeData);
                }

                localStorage.setItem("registeredEmployees", JSON.stringify(registeredEmployees));
                closeModal();
                displayRegisteredIDs();
            }

            if (photoFile) {
                const reader = new FileReader();
                reader.onload = function(e) { commitToStorage(e.target.result); };
                reader.readAsDataURL(photoFile);
            } else {
                commitToStorage(null);
            }
        }

        function setupEdit(index) {
            const emp = registeredEmployees[index];

            document.getElementById("firstName").value = emp.firstName;
            document.getElementById("middleName").value = emp.middleName;
            document.getElementById("lastName").value = emp.lastName;
            document.getElementById("birthday").value = emp.birthday;
            document.getElementById("office").value = emp.office;
            document.getElementById("bloodType").value = emp.bloodType;
            document.getElementById("height").value = emp.height;
            document.getElementById("weight").value = emp.weight;
            document.getElementById("tin").value = emp.tin;
            document.getElementById("gsis").value = emp.gsis;
            document.getElementById("telephone").value = emp.telephone === "N/A" ? "" : emp.telephone;
            document.getElementById("emergencyContact").value = emp.emergencyContact;
            document.getElementById("address").value = emp.address;
            
            // I-load ang dating pirma sa hidden storage field
            document.getElementById("savedSignatureData").value = emp.signatureData || "";

            document.getElementById("editCardIndex").value = index; 
            document.getElementById("modalTitle").textContent = "Modify Registered ID Details";
            document.getElementById("submitFormBtn").textContent = "Save Changes";

            modal.style.display = "flex";
            setTimeout(resizeCanvas, 100);
            
            // I-preview ang lumang pirma sa notepad canvas bilang gabay
            if (emp.signatureData) {
                const img = new Image();
                img.onload = function() { ctx.drawImage(img, 0, 0); };
                img.src = emp.signatureData;
            }
        }

        function triggerDelete(index) {
            const emp = registeredEmployees[index];
            if (confirm(`ARE YOU SURE YOU WANT TO PERMANENTLY REMOVE ${emp.firstName} ${emp.lastName} FROM THE REGISTERED ID LIST?`)) {
                registeredEmployees.splice(index, 1); 
                localStorage.setItem("registeredEmployees", JSON.stringify(registeredEmployees)); 
                displayRegisteredIDs(); 
            }
        }

        function filterEmployees() {
            const input = document.getElementById('searchBar').value.toLowerCase();
            const grid = document.getElementById('employeeGrid');
            const cards = grid.getElementsByClassName('id-card');

            for (let i = 0; i < cards.length; i++) {
                const combinedInfo = cards[i].textContent.toLowerCase();
                if (combinedInfo.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
        // Awtomatikong i-register ang Mobile Service Worker Engine
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js")
            .then(reg => console.log("MOBILE APP TEMPLATE SYNCHRONIZED!"))
            .catch(err => console.log("REGISTRATION ERROR", err));
    });
}
